name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # pnpm 을 먼저 PATH 에 올려야 setup-node 의 cache:pnpm 이 store 경로를 계산할 수 있다.
      # version 미지정 → package.json 의 packageManager(pnpm@11.0.8) 를 사용.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Validate Prisma schema
        run: pnpm exec prisma validate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Build
        run: pnpm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://imdealers.com
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
          GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build app
        run: pnpm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
          GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Start app & run Playwright
        run: |
          pnpm start &
          # 서버 부팅 대기 (최대 60초)
          for i in {1..60}; do
            if curl -fs http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"; break
            fi
            sleep 1
          done
          pnpm exec playwright test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
          ADMIN_ACCESS_TOKEN: ${{ secrets.ADMIN_ACCESS_TOKEN }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_BASE_URL: http://localhost:3000
          # instrumentation.ts 의 loadEnv() 가 production(next start) 부팅 시 강제 검증하는 필수 키.
          # CI E2E 전용 더미 값 — 비밀 아님(실제 운영 값은 Vercel 환경변수에 별도 보관).
          IP_HASH_SALT: ci-e2e-ip-hash-salt-0123456789abcdef
          PII_ENCRYPTION_KEY: aW0tZGVhbGVyLWNpLWUyZS10ZXN0LWtleS0wMDAwMDA=
          CRON_SECRET: ci-e2e-cron-secret-0123456789abcdef0123456789

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload trace artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14

  vehicle-image-e2e:
    name: Vehicle image E2E (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: desktop
            spec: e2e/admin-vehicle-images-desktop.spec.ts
          - name: mobile
            spec: e2e/admin-vehicle-images-mobile.spec.ts
          - name: failure
            spec: e2e/admin-vehicle-images-failure.spec.ts
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Require production deny fingerprint
        env:
          PRODUCTION_DATABASE_FINGERPRINT: ${{ vars.PRODUCTION_DATABASE_FINGERPRINT }}
          PRODUCTION_DATABASE_RUNTIME_FINGERPRINT: ${{ vars.PRODUCTION_DATABASE_RUNTIME_FINGERPRINT }}
          PRODUCTION_DATABASE_DIRECT_FINGERPRINT: ${{ vars.PRODUCTION_DATABASE_DIRECT_FINGERPRINT }}
        run: |
          test -n "$PRODUCTION_DATABASE_FINGERPRINT"
          test -n "$PRODUCTION_DATABASE_RUNTIME_FINGERPRINT"
          test -n "$PRODUCTION_DATABASE_DIRECT_FINGERPRINT"
      - name: Run isolated vehicle image scenario
        env:
          CARPAN2_E2E_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
          CARPAN2_E2E_DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
          CARPAN2_E2E_EXPECTED_FINGERPRINT: 8f06e5e213436c9e7532f1aa5099328336c546ec07872b0631c07253a0f597e2
          PRODUCTION_DATABASE_FINGERPRINT: ${{ vars.PRODUCTION_DATABASE_FINGERPRINT }}
          PRODUCTION_DATABASE_RUNTIME_FINGERPRINT: ${{ vars.PRODUCTION_DATABASE_RUNTIME_FINGERPRINT }}
          PRODUCTION_DATABASE_DIRECT_FINGERPRINT: ${{ vars.PRODUCTION_DATABASE_DIRECT_FINGERPRINT }}
        run: pnpm exec tsx scripts/run-vehicle-image-e2e.ts --spec "${{ matrix.spec }}"
      - name: Upload vehicle image Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vehicle-image-playwright-${{ matrix.name }}
          path: |
            playwright-report/
            test-results/
            .omo/evidence/carpan2-admin-image-management/task-9-${{ matrix.name }}*
          retention-days: 14
