# 의존성 install 빌드스크립트 승인 목록.
# pnpm 버전별 키가 달라 prod(Vercel)에서 어느 버전이 선택돼도 동작하도록 둘 다 둔다:
#   - pnpm 11+: `allowBuilds` (boolean 맵) — pnpm 11에서 onlyBuiltDependencies 등은 제거됨
#   - pnpm 10 : `onlyBuiltDependencies` (allow 목록)
#   - pnpm 9  : 빌드스크립트 기본 실행(설정 불요)
# 로컬/CI 는 packageManager 핀(pnpm@11.0.8)으로 allowBuilds 사용.
allowBuilds:
  '@google/genai': true
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  esbuild: true
  prisma: true
  protobufjs: true
  puppeteer: true
  sharp: true
  unrs-resolver: true
onlyBuiltDependencies:
  - '@google/genai'
  - '@prisma/client'
  - '@prisma/engines'
  - '@sentry/cli'
  - esbuild
  - prisma
  - protobufjs
  - puppeteer
  - sharp
  - unrs-resolver
